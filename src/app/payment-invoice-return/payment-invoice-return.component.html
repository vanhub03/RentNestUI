<main class="py-5 payment-page">
  <!-- Khung trung tam hien trang thai xac nhan giao dich hoa don. -->
  <div class="container">
    <!-- Trang thai loading khi FE dang gui query params MoMo ve backend. -->
    <div class="payment-panel" *ngIf="isLoading">
      <div class="payment-icon">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
      <h2 class="font-bold m-0">Đang xác nhận thanh toán hóa đơn</h2>
      <p class="text-muted m-0">Vui lòng chờ trong giây lát.</p>
    </div>

    <!-- Ket qua sau khi backend da xac thuc chu ky va cap nhat hoa don. -->
    <div class="payment-panel" *ngIf="!isLoading">
      <div class="payment-icon" [class.payment-icon-error]="!paymentResult?.success">
        <i
          class="fas"
          [class.fa-check-circle]="paymentResult?.success"
          [class.fa-times-circle]="!paymentResult?.success"
        ></i>
      </div>
      <h2 class="font-bold m-0">
        {{
          paymentResult?.success
            ? 'Thanh toán hóa đơn thành công'
            : 'Thanh toán hóa đơn chưa thành công'
        }}
      </h2>
      <p class="text-muted m-0">{{ paymentResult?.message }}</p>
      <div class="d-flex gap-2 justify-content-center flex-wrap">
        <a class="btn btn-primary" routerLink="/my-invoices">
          <i class="fas fa-file-invoice-dollar"></i> Quay về hóa đơn của tôi
        </a>
      </div>
    </div>
  </div>
</main>
