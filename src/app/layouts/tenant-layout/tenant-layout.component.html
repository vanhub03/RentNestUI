<main class="tenant-page">
  <div class="container">
    <div class="tenant-layout-grid">
      <aside>
        <div class="profile-sidebar">
          <div class="profile-header">
            <img [src]="getAvatarUrl()" class="profile-avatar" alt="Avatar" />
            <h3 class="font-bold mb-1 profile-name">{{ user.fullName || user.username }}</h3>
            <span class="badge badge-info">Khách tìm phòng</span>
          </div>

          <ul class="nav-pills">
            <li>
              <a href="javascript:void(0)">
                <i class="fas fa-user nav-icon"></i> Thông tin cá nhân
              </a>
            </li>
            <li>
              <a routerLink="/my-requests" routerLinkActive="active">
                <i class="fas fa-inbox nav-icon"></i> Yêu cầu của tôi
              </a>
            </li>
            <li>
              <a href="javascript:void(0)"> <i class="fas fa-key nav-icon"></i> Phòng đang thuê </a>
            </li>
            <li>
              <a routerLink="/my-invoices">
                <i class="fas fa-file-invoice-dollar nav-icon"></i> Hóa đơn
              </a>
            </li>
            <li>
              <a href="javascript:void(0)" class="text-danger" (click)="logout()">
                <i class="fas fa-sign-out-alt nav-icon"></i> Đăng xuất
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <section class="tenant-content">
        <router-outlet></router-outlet>
      </section>
    </div>
  </div>
</main>
